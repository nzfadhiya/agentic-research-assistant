version: "3.9"

services:
  mcp:
    build: .
    command: uvicorn app.mcp_server.server:mcp_app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file: .env

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - mcp

  ui:
    build: .
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api